<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEPA Filter Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2028;
    --border: #2a2d38;
    --accent: #00e5a0;
    --accent2: #5b8cff;
    --warn: #ffb547;
    --danger: #ff5c5c;
    --text: #e8eaf0;
    --muted: #6b7080;
    --ok: #00e5a0;
    --row-hover: #1c1f2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; min-height: 100vh; padding: 32px 24px;
  }
  .header {
    display: flex; align-items: flex-end;
    justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap;
  }
  .header-left h1 {
    font-family: 'Syne', sans-serif; font-size: 28px;
    font-weight: 800; letter-spacing: -0.5px; line-height: 1; color: #fff;
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p {
    font-size: 11px; color: var(--muted); margin-top: 6px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .stat-pill {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .stat-pill b {
    color: var(--text); font-size: 16px;
    font-family: 'Syne', sans-serif; font-weight: 700;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .dot.ok     { background: var(--ok);     box-shadow: 0 0 6px var(--ok); }
  .dot.warn   { background: var(--warn);   box-shadow: 0 0 6px var(--warn); }
  .dot.danger { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .toolbar {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 16px; gap: 10px; flex-wrap: wrap;
  }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); color: var(--muted); pointer-events: none;
  }
  .search-wrap input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; padding: 8px 12px 8px 34px; outline: none;
    width: 220px; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px;
    font-weight: 500; padding: 8px 14px; transition: all 0.18s;
  }
  .btn-primary { background: var(--accent); color: #0a1a12; }
  .btn-primary:hover { background: #00ffc0; transform: translateY(-1px); }
  .btn-ghost {
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent2); }
  .btn-danger-ghost {
    background: transparent; color: var(--danger); border: 1px solid rgba(255,92,92,0.3);
  }
  .btn-danger-ghost:hover { background: rgba(255,92,92,0.1); }
  .board-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  th {
    padding: 12px 16px; text-align: left; font-size: 10px;
    font-weight: 500; color: var(--muted); letter-spacing: 0.1em;
    text-transform: uppercase; white-space: nowrap; user-select: none;
  }
  th:first-child { border-left: 3px solid transparent; }
  .th-sort { cursor: pointer; }
  .th-sort:hover { color: var(--text); }
  tbody tr {
    border-bottom: 1px solid var(--border); transition: background 0.15s;
    cursor: pointer; animation: rowIn 0.3s ease both;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr:hover td:first-child { border-left-color: var(--accent2); }
  td { padding: 13px 16px; font-size: 12px; }
  td:first-child { border-left: 3px solid transparent; transition: border-color 0.15s; }
  .cell-id {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 13px; color: var(--accent2);
  }
  .cell-med .value { font-size: 14px; font-weight: 500; }
  .cell-med .unit { font-size: 10px; color: var(--muted); margin-left: 3px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    border-radius: 6px; font-size: 11px; font-weight: 500;
    padding: 4px 10px; letter-spacing: 0.04em; white-space: nowrap;
  }
  .badge.ok     { background: rgba(0,229,160,0.12); color: var(--ok);     border: 1px solid rgba(0,229,160,0.25); }
  .badge.warn   { background: rgba(255,181,71,0.12); color: var(--warn);   border: 1px solid rgba(255,181,71,0.25); }
  .badge.danger { background: rgba(255,92,92,0.12);  color: var(--danger); border: 1px solid rgba(255,92,92,0.25); }
  .cell-date { color: var(--muted); font-size: 11px; }
  .cell-actions {
    display: flex; gap: 6px; align-items: center;
    opacity: 0; transition: opacity 0.15s;
  }
  tbody tr:hover .cell-actions { opacity: 1; }
  .icon-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 5px; color: var(--muted); cursor: pointer;
    padding: 4px; display: flex; align-items: center; transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent2); }
  .icon-btn.del:hover { color: var(--danger); border-color: var(--danger); }
  .empty { padding: 60px 24px; text-align: center; color: var(--muted); }
  .empty svg { margin-bottom: 12px; opacity: 0.3; }
  .empty p { font-size: 13px; }
  .progress-bar {
    height: 3px; background: var(--border);
    margin-bottom: 32px; border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
  }
  .save-indicator {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--accent);
    letter-spacing: 0.08em; opacity: 0; transition: opacity 0.4s;
    text-transform: uppercase;
  }
  .save-indicator.visible { opacity: 1; }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; width: 380px;
    max-width: 95vw; animation: modalIn 0.22s ease;
  }
  @keyframes modalIn {
    from { opacity:0; transform: scale(0.95) translateY(10px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .modal h2 {
    font-family: 'Syne', sans-serif; font-size: 18px;
    font-weight: 700; margin-bottom: 20px; color: #fff;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 10px 12px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent2); }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 5px 11px; transition: all 0.15s;
  }
  .filter-btn.active { background: rgba(0,229,160,0.12); color: var(--accent); border-color: rgba(0,229,160,0.35); }
  .filter-btn:not(.active):hover { color: var(--text); }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--accent);
    border-radius: 10px; color: var(--text); font-size: 12px;
    padding: 12px 18px; display: flex; align-items: center; gap: 8px;
    z-index: 200; transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="header">
  <div class="header-left">
    <h1>HEPA <span>Filter</span> Monitor</h1>
    <p>Control de mediciones y estado de filtros</p>
  </div>
  <div class="header-right">
    <div class="stat-pill"><span class="dot ok"></span><span>OK <b id="countOk">0</b></span></div>
    <div class="stat-pill"><span class="dot warn"></span><span>Revisar <b id="countWarn">0</b></span></div>
    <div class="stat-pill"><span class="dot danger"></span><span>Crítico <b id="countDanger">0</b></span></div>
    <div class="save-indicator" id="saveIndicator">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Guardado
    </div>
  </div>
</div>

<div class="toolbar">
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="Buscar medición...">
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="ok">OK</button>
      <button class="filter-btn" data-filter="warn">Revisar</button>
      <button class="filter-btn" data-filter="danger">Crítico</button>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-danger-ghost" onclick="confirmClear()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Limpiar todo
    </button>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Nueva medición
    </button>
  </div>
</div>

<div class="board-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th class="th-sort" onclick="sortBy('medicion')">Medición ↕</th>
        <th>Estado</th>
        <th class="th-sort" onclick="sortBy('fecha')">Fecha ↕</th>
        <th>Notas</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
    <p>Sin registros. Agrega una medición.</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2 id="modalTitle">Nueva medición</h2>
    <div class="field">
      <label>ID</label>
      <input id="fId" type="text" placeholder="Ej: HF-006" maxlength="20">
    </div>
    <div class="field">
      <label>Medición (µg/m³)</label>
      <input id="fMedicion" type="number" step="0.1" placeholder="Ej: 12.5">
    </div>
    <div class="field">
      <label>Estado</label>
      <select id="fEstado">
        <option value="ok">✅ OK — Funcionando bien</option>
        <option value="warn">⚠️ Revisar — Requiere atención</option>
        <option value="danger">🔴 Crítico — Reemplazar</option>
      </select>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input id="fFecha" type="date">
    </div>
    <div class="field">
      <label>Notas</label>
      <input id="fNotas" type="text" placeholder="Ej: Revisión mensual, Zona A">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg">Guardado</span>
</div>

<script>
  const STORAGE_KEY  = 'hepa_board_data';
  const COUNTER_KEY  = 'hepa_board_counter';

  function loadFromStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  function persistData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(COUNTER_KEY, String(idCounter));
      flashSaved();
    } catch(e) { showToast('Error al guardar', true); }
  }

  function flashSaved() {
    const el = document.getElementById('saveIndicator');
    el.classList.add('visible');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('visible'), 2200);
  }

  const DEFAULT_DATA = [
    { id:'HF-001', medicion:8.2,  estado:'ok',     fecha:'2025-03-01', notas:'Revisión mensual — Zona A' },
    { id:'HF-002', medicion:34.7, estado:'warn',   fecha:'2025-03-02', notas:'Inicio de saturación' },
    { id:'HF-003', medicion:71.0, estado:'danger', fecha:'2025-03-03', notas:'Reemplazar inmediatamente' },
    { id:'HF-004', medicion:5.1,  estado:'ok',     fecha:'2025-03-04', notas:'Filtro nuevo instalado' },
    { id:'HF-005', medicion:29.4, estado:'warn',   fecha:'2025-03-05', notas:'Zona B — seguimiento' },
  ];

  let data = loadFromStorage() || DEFAULT_DATA;
  let idCounter = parseInt(localStorage.getItem(COUNTER_KEY) || String(data.length + 1));

  let filterActive = 'all', sortKey = null, sortAsc = true, editingId = null;

  const statusMap = {
    ok:     { label:'OK',      css:'ok' },
    warn:   { label:'Revisar', css:'warn' },
    danger: { label:'Crítico', css:'danger' },
  };

  function todayStr() { return new Date().toISOString().split('T')[0]; }

  function fmtDate(d) {
    if (!d) return '—';
    const [y,m,day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function getFiltered() {
    let list = [...data];
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (q) list = list.filter(r =>
      r.id.toLowerCase().includes(q) ||
      String(r.medicion).includes(q) ||
      (r.notas||'').toLowerCase().includes(q)
    );
    if (filterActive !== 'all') list = list.filter(r => r.estado === filterActive);
    if (sortKey) {
      list.sort((a,b) => {
        let va = a[sortKey], vb = b[sortKey];
        if (typeof va === 'number') return sortAsc ? va-vb : vb-va;
        return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
    }
    return list;
  }

  function render() {
    const list = getFiltered();
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    const ok     = data.filter(r=>r.estado==='ok').length;
    const warn   = data.filter(r=>r.estado==='warn').length;
    const danger = data.filter(r=>r.estado==='danger').length;
    document.getElementById('countOk').textContent     = ok;
    document.getElementById('countWarn').textContent   = warn;
    document.getElementById('countDanger').textContent = danger;

    const pct = data.length ? Math.round((ok/data.length)*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('emptyState').style.display = list.length ? 'none' : 'block';

    list.forEach((row, i) => {
      const s = statusMap[row.estado];
      const tr = document.createElement('tr');
      tr.style.animationDelay = (i * 0.04) + 's';
      tr.innerHTML = `
        <td><span class="cell-id">${row.id}</span></td>
        <td class="cell-med"><span class="value">${row.medicion}</span><span class="unit">µg/m³</span></td>
        <td><span class="badge ${s.css}"><span class="dot ${s.css}"></span>${s.label}</span></td>
        <td class="cell-date">${fmtDate(row.fecha)}</td>
        <td style="color:var(--muted);font-size:11px">${row.notas||'—'}</td>
        <td>
          <div class="cell-actions">
            <button class="icon-btn" onclick="editRow('${row.id}')" title="Editar">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn del" onclick="deleteRow('${row.id}')" title="Eliminar">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function sortBy(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    render();
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterActive = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('searchInput').addEventListener('input', render);

  function openModal(id = null) {
    editingId = id;
    const row = id ? data.find(r=>r.id===id) : null;
    document.getElementById('modalTitle').textContent = id ? 'Editar medición' : 'Nueva medición';
    const idField = document.getElementById('fId');
    idField.value    = row ? row.id : '';
    idField.readOnly = !!id;
    idField.style.opacity = id ? '0.45' : '1';
    idField.title = id ? 'El ID no se puede cambiar en modo edición' : '';
    document.getElementById('fMedicion').value = row ? row.medicion : '';
    document.getElementById('fEstado').value   = row ? row.estado   : 'ok';
    document.getElementById('fFecha').value    = row ? row.fecha    : todayStr();
    document.getElementById('fNotas').value    = row ? row.notas    : '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => (id ? document.getElementById('fMedicion') : idField).focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function saveEntry() {
    const customId = document.getElementById('fId').value.trim().toUpperCase();
    const med = parseFloat(document.getElementById('fMedicion').value);
    const est = document.getElementById('fEstado').value;
    const fec = document.getElementById('fFecha').value;
    const not = document.getElementById('fNotas').value;

    if (!customId) { showToast('Ingresa un ID', true); return; }
    if (isNaN(med) || !fec) { showToast('Completa medición y fecha', true); return; }

    if (editingId) {
      const idx = data.findIndex(r=>r.id===editingId);
      if (idx > -1) data[idx] = { ...data[idx], medicion: med, estado: est, fecha: fec, notas: not };
      showToast('Medición actualizada ✓');
    } else {
      // Verificar ID duplicado
      if (data.find(r=>r.id===customId)) { showToast('El ID ya existe', true); return; }
      data.push({ id: customId, medicion: med, estado: est, fecha: fec, notas: not });
      showToast('Medición guardada ✓');
    }

    persistData();
    closeModal();
    render();
  }

  function editRow(id) { openModal(id); }

  function deleteRow(id) {
    data = data.filter(r=>r.id!==id);
    persistData();
    render();
    showToast('Registro eliminado');
  }

  function confirmClear() {
    if (data.length === 0) { showToast('No hay datos'); return; }
    if (confirm('¿Eliminar TODOS los registros? Esta acción no se puede deshacer.')) {
      data = []; idCounter = 1;
      persistData(); render();
      showToast('Todos los registros eliminados');
    }
  }

  function showToast(msg, err=false) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.style.borderColor = err ? 'var(--danger)' : 'var(--accent)';
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  // Si es la primera vez, guardar los datos por defecto
  if (!localStorage.getItem(STORAGE_KEY)) persistData();

  render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – 10 Chillers</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f4f8;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    padding: 24px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-size: 26px;
    font-weight: 800;
    color: #000000;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .page-header p {
    font-size: 13px;
    color: #000000;
    margin-top: 4px;
    letter-spacing: .5px;
  }

  .loading {
    text-align: center;
    padding: 60px 0;
    font-size: 16px;
    color: #64748b;
    letter-spacing: 1px;
  }
  .loading span {
    display: inline-block;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .error-box {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    border-radius: 10px;
    padding: 16px 20px;
    color: #dc2626;
    font-size: 13px;
    max-width: 600px;
    margin: 40px auto;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 18px;
    max-width: 1600px;
    margin: 0 auto;
  }

  @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px)  { .grid { grid-template-columns: 1fr; } }

  .card {
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.07);
    padding: 18px 16px 14px;
    text-align: center;
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.13); }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #000000;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .card-sub {
    font-size: 10px;
    color: #000000;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .status-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 6px;
    letter-spacing: .5px;
  }
  .badge-on      { background: #dcfce7; color: #000000; }
  .badge-standby { background: #fef9c3; color: #000000; }
  .badge-off     { background: #f1f5f9; color: #000000; }

  .gauge-wrap {
    display: flex;
    justify-content: center;
    margin: 4px 0 0;
  }

  .kpi-value {
    font-size: 28px;
    font-weight: 800;
    margin-top: -8px;
    margin-bottom: 8px;
    transition: color .4s;
  }

  .metrics { text-align: left; border-top: 1px solid #f1f5f9; padding-top: 8px; }
  .mrow {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px dashed #e2e8f0;
    font-size: 11px;
  }
  .mrow:last-child { border-bottom: none; }
  .mlabel { color: #000000; font-weight: 500; }
  .mval   { font-family: 'Courier New', monospace; font-weight: 700; color: #000000; }

  .c-normal  { color: #16a34a; }
  .c-warning { color: #d97706; }
  .c-danger  { color: #dc2626; }
  .c-off     { color: #94a3b8; }

  .refresh-btn {
    display: block;
    margin: 24px auto 0;
    padding: 8px 24px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background .2s;
  }
  .refresh-btn:hover { background: #2d2d4e; }
</style>
</head>
<body>

<div class="page-header">
  <h1>Sistema de Chillers – PDM</h1>
  <p id="fecha-reporte">REPORTE DIARIO CHILLER'S · ...</p>
</div>

<div id="loading" class="loading"><span>⏳ Cargando datos desde Monday.com...</span></div>
<div id="error-box" class="error-box" style="display:none"></div>
<div class="grid" id="grid"></div>
<button class="refresh-btn" onclick="loadData()">↻ ACTUALIZAR DATOS</button>

<script>
/* ══════════════════════════════════════════════
   CONFIGURACIÓN  ←  PEGA TU API TOKEN AQUÍ
══════════════════════════════════════════════ */
const MONDAY_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjYyMzQyMjcyOSwiYWFpIjoxMSwidWlkIjoxMDA3NjU5OSwiaWFkIjoiMjAyNi0wMi0xOVQxNjoxMjo1Ni4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6NDQ3Njg5MSwicmduIjoidXNlMSJ9.nY2MXM-x6fb95m2BvxmhUFVMHLxHrJpnl8ZNyjcFfVA';  // ← reemplaza esto
const MONDAY_BOARD = '18391539491';

/* ══════════════════════════════════════════════
   MAPEO DE COLUMNAS
══════════════════════════════════════════════ */
const COL = {
  carga   : 'numeric_mm1h2wdq',
  tempOut : 'numeric_mm1fssgs',
  tempIn  : 'numeric_mm1ffh7p',
  presOut : 'numeric_mm1fkdjh',
  presIn  : 'numeric_mm1f4rmc',
};

/* ══════════════════════════════════════════════
   GAUGE SVG
══════════════════════════════════════════════ */
const SVG_NS = 'http://www.w3.org/2000/svg';
const CX = 115, CY = 110;
const R_OUTER = 94, R_INNER = 62, R_NEEDLE = 86;

function pt(val, r) {
  const rad = (180 - (val / 100) * 180) * Math.PI / 180;
  return { x: CX + r * Math.cos(rad), y: CY - r * Math.sin(rad) };
}
function el(tag, attrs) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function colorClass(val) {
  if (val > 80) return 'c-danger';
  if (val > 50) return 'c-warning';
  return 'c-normal';
}
function kpiColor(val) {
  if (val > 80) return '#dc2626';
  if (val > 50) return '#d97706';
  return '#16a34a';
}

function buildGauge(svgEl, gradId) {
  const defs = document.createElementNS(SVG_NS, 'defs');
  const grad = document.createElementNS(SVG_NS, 'linearGradient');
  grad.setAttribute('id', gradId);
  grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%');
  grad.setAttribute('x2', '100%'); grad.setAttribute('y2', '0%');
  [
    { offset: '0%',   color: '#3DB554' },
    { offset: '50%',  color: '#f59e0b' },
    { offset: '100%', color: '#ef4444' },
  ].forEach(s => {
    const stop = document.createElementNS(SVG_NS, 'stop');
    stop.setAttribute('offset', s.offset);
    stop.setAttribute('stop-color', s.color);
    grad.appendChild(stop);
  });
  defs.appendChild(grad);
  svgEl.appendChild(defs);

  const o1 = pt(0, R_OUTER), o2 = pt(100, R_OUTER);
  const i1 = pt(0, R_INNER), i2 = pt(100, R_INNER);
  const d = [
    `M ${o1.x} ${o1.y}`,
    `A ${R_OUTER} ${R_OUTER} 0 0 1 ${o2.x} ${o2.y}`,
    `L ${i2.x} ${i2.y}`,
    `A ${R_INNER} ${R_INNER} 0 0 0 ${i1.x} ${i1.y}`,
    'Z'
  ].join(' ');
  svgEl.appendChild(el('path', { d, fill: `url(#${gradId})`, opacity: '0.92' }));

  [0, 25, 50, 75, 100].forEach(v => {
    const p1 = pt(v, R_OUTER + 3);
    const p2 = pt(v, R_OUTER + 11);
    const pl = pt(v, R_OUTER + 20);
    svgEl.appendChild(el('line', {
      x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y,
      stroke: '#000000', 'stroke-width': '1.5', 'stroke-linecap': 'round'
    }));
    const txt = el('text', {
      x: pl.x, y: pl.y + 4,
      'text-anchor': 'middle', 'font-size': '8',
      'font-family': 'Segoe UI, Arial, sans-serif', fill: '#000000'
    });
    txt.textContent = v + '%';
    svgEl.appendChild(txt);
  });

  const needle = el('line', {
    x1: CX, y1: CY, x2: CX - R_NEEDLE, y2: CY,
    stroke: '#1a1a2e', 'stroke-width': '3', 'stroke-linecap': 'round'
  });
  svgEl.appendChild(needle);
  svgEl.appendChild(el('circle', { cx: CX, cy: CY, r: '8',  fill: '#1a1a2e' }));
  svgEl.appendChild(el('circle', { cx: CX, cy: CY, r: '3.5', fill: '#fff'   }));
  return needle;
}

function animateNeedle(needle, kpiEl, targetVal, delay) {
  setTimeout(() => {
    const duration = 1400;
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const cur = ease * targetVal;
      const p = pt(cur, R_NEEDLE);
      needle.setAttribute('x2', p.x);
      needle.setAttribute('y2', p.y);
      kpiEl.textContent = Math.round(cur) + '%';
      kpiEl.style.color = kpiColor(cur);
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }, delay);
}

/* ══════════════════════════════════════════════
   FETCH DESDE MONDAY.COM
══════════════════════════════════════════════ */
async function fetchMonday() {
  const query = `
    query {
      boards(ids: ${MONDAY_BOARD}) {
        items_page(limit: 50) {
          items {
            name
            column_values(ids: ["status","${COL.carga}","${COL.tempOut}","${COL.tempIn}","${COL.presOut}","${COL.presIn}"]) {
              id
              text
            }
          }
        }
      }
    }
  `;

  const res = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': MONDAY_TOKEN,
      'API-Version': '2024-01'
    },
    body: JSON.stringify({ query })
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data.boards[0].items_page.items;
}

function parseItems(items) {
  return items.map((item, idx) => {
    const cols = {};
    item.column_values.forEach(c => cols[c.id] = c.text);

    // Normalizar status de Monday → on / standby / off
    const rawStatus = (cols['status'] || '').toLowerCase();
    let status = 'off';
    if (rawStatus.includes('operando') || rawStatus.includes('on') || rawStatus.includes('activo')) status = 'on';
    else if (rawStatus.includes('standby') || rawStatus.includes('espera')) status = 'standby';

    return {
      id      : idx + 1,
      name    : item.name,
      sub     : '',
      carga   : parseFloat(cols[COL.carga])   || 0,
      tempOut : parseFloat(cols[COL.tempOut]) || 0,
      tempIn  : parseFloat(cols[COL.tempIn])  || 0,
      presOut : parseFloat(cols[COL.presOut]) || 0,
      presIn  : parseFloat(cols[COL.presIn])  || 0,
      status,
    };
  });
}

/* ══════════════════════════════════════════════
   RENDER DE TARJETAS
══════════════════════════════════════════════ */
function renderCards(chillers) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  chillers.forEach((ch, idx) => {
    const card = document.createElement('div');
    card.className = 'card';

    const badgeClass = ch.status === 'on' ? 'badge-on' : ch.status === 'standby' ? 'badge-standby' : 'badge-off';
    const badgeText  = ch.status === 'on' ? '● OPERANDO' : ch.status === 'standby' ? '◐ STANDBY' : '○ APAGADO';
    const isOff = ch.status === 'off';
    const gradId = `grad-ch${ch.id}`;

    card.innerHTML = `
      <div class="card-title">${ch.name}</div>
      <div class="card-sub">${ch.sub}</div>
      <span class="status-badge ${badgeClass}">${badgeText}</span>
      <div class="gauge-wrap">
        <svg id="svg-${ch.id}" width="230" height="135" viewBox="0 0 230 135" overflow="visible"></svg>
      </div>
      <div class="kpi-value" id="kpi-${ch.id}" style="color:${isOff ? '#94a3b8' : '#000000'}">${isOff ? '—' : '0%'}</div>
      <div class="metrics">
        <div class="mrow"><span class="mlabel">Carga</span><span class="mval ${isOff ? 'c-off' : colorClass(ch.carga)}">${isOff ? '—' : ch.carga + ' %'}</span></div>
        <div class="mrow"><span class="mlabel">T° Salida</span><span class="mval ${isOff ? 'c-off' : ch.tempOut > 40 ? 'c-danger' : 'c-normal'}">${isOff ? '—' : ch.tempOut + ' °F'}</span></div>
        <div class="mrow"><span class="mlabel">T° Entrada</span><span class="mval ${isOff ? 'c-off' : ch.tempIn > 40 ? 'c-danger' : 'c-normal'}">${isOff ? '—' : ch.tempIn + ' °F'}</span></div>
        <div class="mrow"><span class="mlabel">P. Salida</span><span class="mval ${isOff ? 'c-off' : 'c-warning'}">${isOff ? '—' : ch.presOut + ' psi'}</span></div>
        <div class="mrow"><span class="mlabel">P. Entrada</span><span class="mval ${isOff ? 'c-off' : 'c-warning'}">${isOff ? '—' : ch.presIn + ' psi'}</span></div>
      </div>
    `;

    grid.appendChild(card);

    const svgEl = document.getElementById(`svg-${ch.id}`);
    const needle = buildGauge(svgEl, gradId);
    const kpiEl  = document.getElementById(`kpi-${ch.id}`);
    if (!isOff) animateNeedle(needle, kpiEl, ch.carga, idx * 120);
  });
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('grid').innerHTML = '';

  try {
    const items    = await fetchMonday();
    const chillers = parseItems(items);
    renderCards(chillers);
  } catch (err) {
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-box').innerHTML =
      `⚠️ No se pudo conectar con Monday.com<br><small>${err.message}</small><br><br>
       Verifica que el token sea correcto y que el tablero sea accesible.`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// Fecha automática
const hoy  = new Date();
const dia  = String(hoy.getDate()).padStart(2, '0');
const mes  = String(hoy.getMonth() + 1).padStart(2, '0');
const anio = hoy.getFullYear();
document.getElementById('fecha-reporte').textContent =
  `REPORTE DIARIO CHILLER'S · ${dia}/${mes}/${anio}`;

// Cargar al abrir
loadData();
</script>
</body>
</html>
